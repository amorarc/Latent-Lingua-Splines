model:
  name: "Qwen/Qwen3.5-0.8B"

projection_samples: 20000   # random vocab tokens used to fit PCA+UMAP (-1 = all)

pca:
  n_components: 64

umap:
  n_components: 3
  n_neighbors: 15
  min_dist: 0.1
  metric: "cosine"
  random_state: 42

projection:
  output_path: "models/projection.pkl"

visualization:
  output_path: "outputs/embedding_space.png"
  dpi: 150
  point_size: 2
  alpha: 0.6
